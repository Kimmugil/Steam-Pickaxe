name: AI 분석 (일 단위)

on:
  schedule:
    - cron: "0 21 * * *"   # 매일 KST 06:00 (수집 완료 후 1시간 뒤)
  workflow_dispatch:
  repository_dispatch:
    types: [reanalyze-game, analyze-game]  # reanalyze-game: 수동, analyze-game: collect 완료 후 자동

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: 의존성 설치
        run: pip install -r backend/requirements.txt

      - name: AI 분석 실행
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          MASTER_SPREADSHEET_ID: ${{ secrets.MASTER_SPREADSHEET_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # repository_dispatch client_payload 경유 — schedule/workflow_dispatch 시 빈 문자열
          TARGET_APPID: ${{ github.event.client_payload.appid }}
          TARGET_EVENT_ID: ${{ github.event.client_payload.event_id }}
        run: |
          cd backend
          python main_analyze.py
