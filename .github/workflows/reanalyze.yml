name: AI 분석 새로고침 (특정 게임)
# 프론트엔드 [AI 분석 새로고침] 버튼이 repository_dispatch(reanalyze-game)를 보내면
# 1) 해당 게임의 뉴스·패치 재수집 (리뷰 제외)
# 2) 이어서 해당 게임의 AI 분석 재실행

on:
  repository_dispatch:
    types: [reanalyze-game]

jobs:
  reanalyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: 의존성 설치
        run: pip install -r backend/requirements.txt

      - name: 뉴스·패치 재수집 (리뷰 제외)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          MASTER_SPREADSHEET_ID: ${{ secrets.MASTER_SPREADSHEET_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
          TARGET_APPID: ${{ github.event.client_payload.appid }}
          NEWS_ONLY: "true"
        run: |
          cd backend
          python main_collect.py

      - name: Sheets API 쿼터 회복 대기 (60초)
        run: sleep 60

      - name: AI 분석 실행
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          MASTER_SPREADSHEET_ID: ${{ secrets.MASTER_SPREADSHEET_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TARGET_APPID: ${{ github.event.client_payload.appid }}
          TARGET_EVENT_ID: ${{ github.event.client_payload.event_id }}
        run: |
          cd backend
          python main_analyze.py
